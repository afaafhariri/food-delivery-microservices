server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        add-to-simple-url-handler-mapping: true

quickbite:
  services:
    restaurant-url: ${RESTAURANT_SERVICE_URL:http://restaurant-service:8081}
    order-url: ${ORDER_SERVICE_URL:http://order-service:8082}
    delivery-url: ${DELIVERY_SERVICE_URL:http://delivery-service:8083}
    customer-url: ${CUSTOMER_SERVICE_URL:http://customer-service:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.quickbite.gateway: INFO
    org.springframework.cloud.gateway: INFO
